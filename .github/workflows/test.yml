name: Test

# 测试：pytest 单元测试 + neutron 编译器端到端测试
# 在 CANN/CUDA/CPU 三个目标后端上验证 op → arch code 编译正确性

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.py"
      - "bin/neutron"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发，便于排查

concurrency:
  group: test-${{ github.ref }}-${{ matrix.target }}
  cancel-in-progress: true

jobs:
  # -------- 1. Python 单元测试 --------
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install deps
        run: |
          pip install --upgrade pip
          # 若仓库有 pyproject.toml 则安装 [test] extras，否则回退到 requirements
          if [ -f pyproject.toml ]; then
            pip install -e ".[test]" || pip install pytest pytest-xdist pytest-cov
          else
            pip install pytest pytest-xdist pytest-cov
          fi

      - name: Run pytest
        run: |
          pytest -n auto --maxfail=1 --cov --cov-report=xml \
            --junitxml=test-results.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            test-results.xml
            coverage.xml

  # -------- 2. neutron 编译器端到端测试 --------
  neutron-e2e:
    # 验证 bin/neutron 能把 ONNX op 编译为各后端 arch code
    # 真正跑 NPU/CUDA 编译产物需要对应硬件，这里只验证代码生成 (gen) 阶段
    strategy:
      fail-fast: false
      matrix:
        target: [cpu, cuda, npu]   # CANN (npu) / CUDA / CPU 三后端
        opt: ["0", "1", "2", "3"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for onnx fixture)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install onnxruntime (fixture 生成)
        run: pip install onnxruntime numpy

      - name: Make binary executable
        run: chmod +x bin/neutron

      - name: Sanity check (no args → usage)
        run: |
          set -e
          out=$(./bin/neutron 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "用法: neutron"

      - name: Generate small ONNX fixture
        run: |
          python - <<'PY'
          import numpy as np, onnx
          from onnx import helper, TensorProto
          X = helper.make_tensor_value_info("X", TensorProto.FLOAT, [1, 3, 8, 8])
          W = helper.make_tensor_value_info("W", TensorProto.FLOAT, [4, 3, 3, 3])
          Y = helper.make_tensor_value_info("Y", TensorProto.FLOAT, [1, 4, 8, 8])
          node = helper.make_node("Conv", ["X", "W"], ["Y"],
                                  kernel_shape=[3, 3], pads=[1, 1, 1, 1], strides=[1, 1])
          g = helper.make_graph([node], "g", [X, W], [Y])
          m = helper.make_model(g, opset_imports=[helper.make_opsetid("", 17)])
          onnx.save(m, "conv.onnx")
          print("wrote conv.onnx")
          PY

      - name: Run neutron compile (--target=${{ matrix.target }} --opt=${{ matrix.opt }})
        run: |
          ./bin/neutron conv.onnx \
            --target ${{ matrix.target }} \
            --opt ${{ matrix.opt }} \
            --dump 2>&1 | tee neutron-${{ matrix.target }}-o${{ matrix.opt }}.log
          # 编译必须无错误退出
          test -s neutron-${{ matrix.target }}-o${{ matrix.opt }}.log

      - name: Upload neutron logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neutron-${{ matrix.target }}-o${{ matrix.opt }}
          path: |
            neutron-*.log
            *.cpp
            *.cu
            *.cc
