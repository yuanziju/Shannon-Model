name: Build

# 构建检查：验证 bin/neutron 预编译二进制可运行 + SHA256 校验
# neutron 源码在 vllm-ascend 仓库 (Rust workspace), 不在此仓库构建
# 此处只做"下载产物冒烟"——确保 commit 进 main 的二进制可用

on:
  pull_request:
    branches: [main]
    paths:
      - "bin/neutron"
      - "bin/neutron.sha256"
      - ".github/workflows/build.yml"
  push:
    branches: [main]
    paths:
      - "bin/neutron"
      - "bin/neutron.sha256"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make binary executable
        run: chmod +x bin/neutron

      - name: Verify ELF format
        run: |
          test -s bin/neutron
          file bin/neutron
          # 必须 x86_64 ELF, 不能是空文件或文本
          file bin/neutron | grep -q "ELF 64-bit LSB"

      - name: Verify SHA256 checksum
        # 如果存在 bin/neutron.sha256 则校验, 不存在则跳过 (老 commit 可能没有)
        run: |
          if [ -f bin/neutron.sha256 ]; then
            echo "found bin/neutron.sha256, verifying..."
            cat bin/neutron.sha256
            # sha256sum -c 需要 .sha256 文件内容格式为 "<hash>  <filename>"
            # 兼容 ta 写的格式 (可能是 "<hash>  bin/neutron" 或裸 hash)
            if grep -q "bin/neutron" bin/neutron.sha256; then
              (cd bin && sha256sum -c neutron.sha256)
            else
              # 裸 hash 格式
              expected=$(awk '{print $1}' bin/neutron.sha256 | tr -d '[:space:]')
              actual=$(sha256sum bin/neutron | awk '{print $1}')
              echo "expected: $expected"
              echo "actual:   $actual"
              test "$expected" = "$actual"
            fi
            echo "SHA256 OK"
          else
            echo "::notice::bin/neutron.sha256 not found, skipping checksum verification"
          fi

      - name: Run with no args (expect usage)
        run: |
          out=$(./bin/neutron 2>&1 || true)
          echo "$out"
          # neutron 无参数应输出 usage
          echo "$out" | grep -q "用法: neutron"
          # 且必须列出所有 target
          echo "$out" | grep -q "cuda"
          echo "$out" | grep -q "npu"
          echo "$out" | grep -q "cpu"

      - name: Smoke compile a tiny ONNX (cpu target)
        # 真正喂一个最小 ONNX, 验证编译流程能跑通
        run: |
          pip install --quiet onnxruntime numpy
          python - <<'PY'
          import numpy as np, onnx
          from onnx import helper, TensorProto
          X = helper.make_tensor_value_info("X", TensorProto.FLOAT, [1, 3])
          Y = helper.make_tensor_value_info("Y", TensorProto.FLOAT, [1, 3])
          node = helper.make_node("Relu", ["X"], ["Y"])
          g = helper.make_graph([node], "g", [X], [Y])
          m = helper.make_model(g, opset_imports=[helper.make_opsetid("", 17)])
          onnx.save(m, "relu.onnx")
          PY
          ./bin/neutron relu.onnx --target cpu --opt 1 --dump 2>&1 | tee compile.log
          test -s compile.log

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: neutron-binary
          path: |
            bin/neutron
            bin/neutron.sha256
            compile.log
