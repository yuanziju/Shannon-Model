name: Build

# 构建检查：从源码编译 neutron 二进制 + 验证预编译 bin/neutron 可运行
# vllm-ascend: 把 ONNX op 编译成 arch code, 支持 CANN(NPU) / CUDA / CPU 三后端

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"            # neutron 源码 (Rust)
      - "bin/neutron"       # 预编译产物
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      ".github/workflows/build.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------- 1. 预编译二进制冒烟测试 --------
  smoke-test-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make binary executable
        run: chmod +x bin/neutron

      - name: Verify ELF format
        run: |
          file bin/neutron
          # 必须 x86_64 ELF, 不能是空文件或文本
          test -s bin/neutron
          file bin/neutron | grep -q "ELF 64-bit LSB"

      - name: Run with no args (expect usage)
        run: |
          out=$(./bin/neutron 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "用法: neutron"
          echo "$out" | grep -q "cuda|npu|cpu"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neutron-binary
          path: bin/neutron

  # -------- 2. 从源码构建 (Rust) --------
  build-from-source:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: neutron-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: neutron-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Check Rust source exists
        id: has-rust
        run: |
          if [ -f Cargo.toml ] && [ -d src ]; then
            echo "has_rust=true" >> $GITHUB_OUTPUT
            echo "found Cargo.toml + src/"
          else
            echo "has_rust=false" >> $GITHUB_OUTPUT
            echo "no Rust source, skip build-from-source"
          fi

      - name: Setup Rust toolchain
        if: steps.has-rust.outputs.has-rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        if: steps.has-rust.outputs.has_rust == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Build release
        if: steps.has-rust.outputs.has_rust == 'true'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify built binary runs
        if: steps.has-rust.outputs.has_rust == 'true'
        run: |
          BIN=target/${{ matrix.target }}/release/neutron
          chmod +x "$BIN"
          out=$("$BIN" 2>&1 || true)
          echo "$out" | grep -q "用法: neutron"

      - name: Package binary
        if: steps.has-rust.outputs.has_rust == 'true'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/neutron dist/${{ matrix.artifact }}
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload build artifact
        if: steps.has-rust.outputs.has_rust == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
